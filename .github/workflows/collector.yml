name: Collecte automatique des annonces

on:
  schedule:
    # 1 fois par jours
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run collector
        run: node backend/collector.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GENIUSPAY_API_KEY: ${{ secrets.GENIUSPAY_API_KEY }}
          GENIUSPAY_API_SECRET: ${{ secrets.GENIUSPAY_API_SECRET }}
          GENIUSPAY_WEBHOOK_SECRET: ${{ secrets.GENIUSPAY_WEBHOOK_SECRET }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}