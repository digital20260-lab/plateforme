<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Logo / favicon PNG : visible dans l'onglet, l'onglet épinglé et l'installation PWA -->
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="shortcut icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f15a00" />
    <meta name="msapplication-TileColor" content="#f15a00" />

    <!-- ============ SEO PRINCIPAL ============ -->
    <title>Emploi Concours CI — Offres d'emploi et concours en Côte d'Ivoire 2026</title>
    <meta name="description" content="Toutes les offres d'emploi et concours administratifs de Côte d'Ivoire en un seul endroit : INFAS, CAFOP, ENA, Police, Gendarmerie, Fonction Publique. Alertes email, anciens sujets et quiz gratuits de préparation." />
    <meta name="keywords" content="concours côte d'ivoire 2026, offre emploi côte d'ivoire, concours INFAS 2026, concours CAFOP, concours ENA, recrutement côte d'ivoire, emploi public abidjan, concours fonction publique CI, concours police, concours gendarmerie, anciens sujets concours, emploi abidjan" />
    <meta name="author" content="Emploi Concours CI" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <link rel="canonical" href="https://emploi-concours.ci/" />

    <!-- Géolocalisation (recherches locales CI) -->
    <meta name="geo.region" content="CI" />
    <meta name="geo.placename" content="Abidjan, Côte d'Ivoire" />
    <meta name="language" content="fr" />
    <meta http-equiv="content-language" content="fr-CI" />

    <!-- ============ OPEN GRAPH (Facebook, WhatsApp, LinkedIn) ============ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Emploi Concours CI" />
    <meta property="og:title" content="Emploi Concours CI — Offres d'emploi et concours en Côte d'Ivoire" />
    <meta property="og:description" content="La plateforme n°1 des emplois et concours en Côte d'Ivoire : INFAS, CAFOP, ENA, Police, Fonction Publique. Mise à jour toutes les 6h. Alertes email, sujets et quiz gratuits." />
    <meta property="og:url" content="https://emploi-concours.ci/" />
    <meta property="og:locale" content="fr_CI" />

    <!-- ============ TWITTER / X CARDS ============ -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Emploi Concours CI — Emplois & Concours Côte d'Ivoire" />
    <meta name="twitter:description" content="Toutes les offres d'emploi et concours de Côte d'Ivoire centralisés. Alertes email, anciens sujets, quiz gratuits." />

    <!-- ============ PERFORMANCE (Core Web Vitals = facteur SEO) ============ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />

    <!-- ============ DONNÉES STRUCTURÉES JSON-LD ============ -->
    <!-- Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Emploi Concours CI",
      "url": "https://plateforme-tau.vercel.app",
      "logo": "https://plateforme-tau.vercel.app/logo.png",
      "description": "Plateforme de centralisation des offres d'emploi et concours administratifs en Côte d'Ivoire.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Abidjan",
        "addressCountry": "CI"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "contact@emploi-concours.ci",
        "contactType": "customer service",
        "availableLanguage": "French"
      }
    }
    </script>

    <!-- Site web + barre de recherche Google (Sitelinks Search Box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Emploi Concours CI",
      "alternateName": "emploi-concours.ci",
      "url": "https://emploi-concours.ci",
      "inLanguage": "fr-CI",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://emploi-concours.ci/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- FAQ (rich snippets dans Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Comment s'inscrire au concours INFAS 2026 en Côte d'Ivoire ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'inscription au concours INFAS 2026 se fait en ligne sur le site officiel infas.ciconcours.com. Les frais totaux sont de 40 000 FCFA (28 000 FCFA d'inscription + 12 000 FCFA de concours), payables par Mobile Money. Retrouvez le calendrier complet, les conditions par filière et le dossier à fournir sur emploi-concours.ci."
          }
        },
        {
          "@type": "Question",
          "name": "Où trouver toutes les offres d'emploi public en Côte d'Ivoire ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Emploi Concours CI centralise les offres d'emploi public et privé de Côte d'Ivoire, mises à jour toutes les 6 heures depuis les sources officielles. Chaque offre indique l'entreprise, le lieu, le contrat, le niveau requis et l'email officiel de candidature."
          }
        },
        {
          "@type": "Question",
          "name": "Quels concours sont ouverts en Côte d'Ivoire en 2026 ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les principaux concours 2026 suivis par la plateforme : INFAS (santé), CAFOP (instituteurs), ENS Abidjan, INFJ (justice), Police Nationale, Gendarmerie, INJS, INSFS et les concours de la Fonction Publique (MEMFPMA/ENA). Chaque fiche détaille conditions, frais, calendrier et site officiel d'inscription."
          }
        },
        {
          "@type": "Question",
          "name": "La plateforme Emploi Concours CI est-elle gratuite ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. La consultation des offres et concours, la recherche avec filtres et 1 quiz de préparation par jour sont gratuits. Le plan Premium (1 500 FCFA/mois) ajoute les alertes email instantanées, le coaching individuel et les quiz illimités."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
